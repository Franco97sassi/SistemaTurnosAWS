services:
  api:
    build: ./backend
    container_name: turnos_api
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: turnos_db
    restart: always
    environment:
      POSTGRES_DB: turnos_db
      POSTGRES_USER: turnos_user
      POSTGRES_PASSWORD: turnos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: